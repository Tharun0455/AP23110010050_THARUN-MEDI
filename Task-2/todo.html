<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 80px;
        }

        .container{
            width: 350px;
            margin: auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            
        }

        input{
            padding: 8px;
            width: 200px;
            border: 1px solid gray;
            border-radius: 5px;
        }

        button{
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #45a049;
        }

        ol{
            text-align: left;
            margin-top: 20px;
        }

        li{
            padding: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>To Do List</h1>

        <input type="text" placeholder="Enter task" id="task">
        <button onclick="addtask()">Add Task</button>

        <ol id="taskList"></ol>
    </div>

    <script>
        function addtask() {
            let taskText = document.getElementById("task").value;

            if(taskText != "") {
                let item = document.createElement("li");
                item.innerText = taskText;

                let list = document.getElementById("taskList");
                list.appendChild(item);

                document.getElementById("task").value = "";
            }
            else {
                alert("Please enter a task");
            }
        }
    </script>

</body>
</html>
