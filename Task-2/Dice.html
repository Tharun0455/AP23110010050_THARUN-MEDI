<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Game</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 50px;
        }

        img {
            width: 200px;
            height: 200px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }

        h2 {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Dice Game</h1>
    <img id="dice" src="1.jpeg" alt="Dice"><br>
    <button onclick="rollDice()">Roll Dice</button>

    <h2 id="result">Click the button to roll the dice</h2>

    <script>
        function rollDice() {
            let randomNum = Math.floor(Math.random() * 6) + 1;
            let dice = document.getElementById("dice");
            let attr = document.createAttribute("src");
            attr.value = randomNum + ".jpeg";
            dice.setAttributeNode(attr);
            document.getElementById("result").innerHTML =
                "You rolled: " + randomNum;
        }
    </script>
</body>
</html>
