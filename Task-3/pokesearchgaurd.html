<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Search Card</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        min-height:100vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        background:linear-gradient(135deg,#ffecd2,#fcb69f);
        padding-top:50px;
    }

    h1{
        margin-bottom:20px;
        color:#333;
    }

    input{
        padding:12px;
        width:250px;
        border:none;
        border-radius:8px;
        outline:none;
        font-size:16px;
    }

    button{
        padding:12px 20px;
        border:none;
        border-radius:8px;
        background:goldenrod;
        color:white;
        font-size:16px;
        cursor:pointer;
        margin-left:10px;
    }

    button:hover{
        background:orange;
    }

    .card{
        display:none;
        width:350px;
        margin-top:30px;
        background:white;
        border-radius:20px;
        padding:20px;
        text-align:center;
        animation:glow 2s infinite alternate;
    }

    @keyframes glow{
        from{
            box-shadow:0 0 10px gold;
        }
        to{
            box-shadow:0 0 30px orange;
        }
    }

    .card img{
        width:180px;
        height:180px;
        object-fit:contain;
    }

    .card h2{
        color:#333;
        margin:10px 0;
    }

    .info{
        text-align:left;
        margin-top:15px;
    }

    .info p{
        margin:8px 0;
        padding:8px;
        background:#f5f5f5;
        border-radius:8px;
    }
</style>
</head>
<body>

<h1>Pokemon Search</h1>

<div>
    <input type="text" id="pokiname" placeholder="Enter Pokemon Name">
    <button onclick="pokidata()">Search</button>
</div>

<div class="card" id="card">
    <img id="pokiimg" src="">
    <h2 id="pokinameDisplay"></h2>

    <div class="info">
        <p><b>ID:</b> <span id="id"></span></p>
        <p><b>Height:</b> <span id="height"></span></p>
        <p><b>Weight:</b> <span id="weight"></span></p>
        <p><b>Base Experience:</b> <span id="exp"></span></p>
        <p><b>Type:</b> <span id="type"></span></p>
        <p><b>Abilities:</b> <span id="abilities"></span></p>
        <p><b>Moves:</b> <span id="moves"></span></p>
    </div>
</div>

<script>

async function pokidata(){

    try{

        const pokiname =
        document.getElementById("pokiname").value.toLowerCase();

        const response =
        await fetch(`https://pokeapi.co/api/v2/pokemon/${pokiname}`);

        if(!response.ok){
            throw new Error("Pokemon Not Found");
        }

        const data = await response.json();

        document.getElementById("card").style.display = "block";

        document.getElementById("pokiimg").src =
        data.sprites.front_default;

        document.getElementById("pokinameDisplay").textContent =
        data.name.toUpperCase();

        document.getElementById("id").textContent =
        data.id;

        document.getElementById("height").textContent =
        data.height;

        document.getElementById("weight").textContent =
        data.weight;

        document.getElementById("exp").textContent =
        data.base_experience;

        document.getElementById("type").textContent =
        data.types.map(t => t.type.name).join(", ");

        document.getElementById("abilities").textContent =
        data.abilities.map(a => a.ability.name).join(", ");

        document.getElementById("moves").textContent =
        data.moves.slice(0,5).map(m => m.move.name).join(", ");

    }
    catch(error){
        alert(error.message);
    }

}

</script>

</body>
</html>
